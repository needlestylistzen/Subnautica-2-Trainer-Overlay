name: Feature request
description: Suggest a module or QoL improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do in single-player?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Survival module
        - Mobility module
        - Inventory module
        - World module
        - Vehicle module
        - UI / UX
        - Documentation
    validations:
      required: true
